# Project-scoped, read-only documentation integration.
# Remove this table to roll the integration back.
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = true
required = false
startup_timeout_sec = 10.0
tool_timeout_sec = 30.0
enabled_tools = [
  "search_openai_docs",
  "fetch_openai_doc",
  "list_api_endpoints",
  "get_openapi_spec",
  "list_openai_docs",
]
